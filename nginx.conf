# Argus by Perciqa — Nginx reverse proxy config
# Place at /etc/nginx/sites-available/argus or similar.
#
# Routes:
#   /            → Next.js UI (port 3000)
#   /api/*       → FastAPI server (port 8000)
#   /ws/*        → FastAPI WebSocket (port 8000)
#
# SSL handled by certbot (Let's Encrypt).

server {
    listen 80;
    server_name argus.perciqa.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS (after cert is obtained)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name argus.perciqa.com;

    ssl_certificate     /etc/letsencrypt/live/argus.perciqa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/argus.perciqa.com/privkey.pem;

    # WebSocket upgrade support
    location /ws/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # API routes
    location /api/ {
        proxy_pass http://server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js UI
    location / {
        proxy_pass http://ui:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
