name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate API key
        id: genkey
        run: echo "ARGUS_API_KEY=arg_$(openssl rand -hex 24)" >> $GITHUB_ENV

      - name: Create .env
        run: |
          cat > .env << EOF
          EVAL_SAMPLE_RATE=0.0
          ARGUS_DB_PATH=/app/data/argus.db
          ARGUS_API_KEY=${{ env.ARGUS_API_KEY }}
          EOF

      - name: Build & start all services
        run: docker compose up -d --build

      - name: Wait for health
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Server healthy"
              break
            fi
            echo "Waiting for server... ($i/15)"
            sleep 4
          done
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "UI healthy"
              docker compose ps
              exit 0
            fi
            echo "Waiting for UI... ($i/15)"
            sleep 4
          done
          echo "UI failed to start"
          docker compose logs ui
          exit 1

      - name: Validate API endpoints
        run: |
          AUTH="X-API-Key: ${{ env.ARGUS_API_KEY }}"

          echo "=== Health ==="
          curl -sf http://localhost:8000/api/health | python3 -m json.tool
          echo ""

          echo "=== Traces ==="
          TRACES=$(curl -sf -H "$AUTH" http://localhost:8000/api/traces)
          echo "$TRACES" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Traces: {d[\"total\"]}')"

          echo "=== FinOps ==="
          curl -sf -H "$AUTH" http://localhost:8000/api/finops/summary | python3 -m json.tool
          echo ""

          echo "=== Config (authenticated) ==="
          curl -sf -H "$AUTH" http://localhost:8000/api/config | python3 -m json.tool
          echo ""

          echo "=== UI ==="
          curl -s -o /dev/null -w "UI HTTP %{http_code}\n" http://localhost:3000

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Server logs ==="
          docker compose logs server
          echo "=== UI logs ==="
          docker compose logs ui
