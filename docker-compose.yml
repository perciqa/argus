# ── Argus · docker-compose ──────────────────────────────────────────────────
# One-command startup: docker compose up
# Requires: .env with FIREWORKS_API_KEY (optional — evals degrade to local)

services:

  # ── FastAPI server ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across restarts
      - argus_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Next.js UI ─────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./packages/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server is reachable at internal Docker hostname
      - NEXT_PUBLIC_API_URL=http://server:8000/api
      - NEXT_PUBLIC_WS_URL=ws://server:8000
      - NODE_ENV=production
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ── Demo seeder (runs once, exits) ─────────────────────────────────────────
  seed:
    image: curlimages/curl:latest
    environment:
      - BASE=http://server:8000
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed_demo.sh"]
    restart: "no"

  # ── Nginx reverse proxy (uncomment for production with custom domain) ───────
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - certbot_data:/var/www/certbot
  #     - letsencrypt:/etc/letsencrypt
  #   depends_on:
  #     server:
  #       condition: service_healthy
  #     ui:
  #       condition: service_started
  #   restart: unless-stopped

volumes:
  argus_data:
    driver: local
