services:
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ui:
    build:
      context: ./packages/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ARGUS_SERVER_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  demo:
    build:
      context: ./demo
      dockerfile: Dockerfile
    environment:
      - ARGUS_SERVER_URL=http://server:8000
    env_file:
      - .env
    depends_on:
      server:
        condition: service_healthy
    restart: "no"

volumes:
  data:
