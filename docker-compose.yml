# ── Argus · docker-compose ──────────────────────────────────────────────────
# One-command startup: docker compose up
# Requires: .env with FIREWORKS_API_KEY (optional — evals degrade to local)

services:

  # ── FastAPI server ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across restarts
      - argus_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Next.js UI ─────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./packages/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server is reachable at internal Docker hostname
      - NEXT_PUBLIC_API_URL=http://server:8000/api
      - NEXT_PUBLIC_WS_URL=ws://server:8000
      - NODE_ENV=production
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ── Demo seeder (runs once, exits) ─────────────────────────────────────────
  seed:
    image: curlimages/curl:latest
    environment:
      - BASE=http://server:8000
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed_demo.sh"]
    restart: "no"

volumes:
  argus_data:
    driver: local
