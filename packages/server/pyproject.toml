[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "argus-server"
version = "0.1.0"
description = "Argus by Perciqa — FastAPI backend server"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.50",
    "aiosqlite>=0.22",
    "pydantic>=2.13",
    "httpx>=0.28",
    "openai>=2.44",
    "python-dotenv>=1.0",
    "slowapi>=0.1.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
