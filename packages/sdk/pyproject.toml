[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ratioc"
version = "0.1.0"
description = "The Agent Reliability Engine — trace, evaluate, and optimize your AI agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.13",
    "httpx>=0.28",
    "openai>=2.44",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[tool.hatch.build.targets.wheel]
packages = ["ratioc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
