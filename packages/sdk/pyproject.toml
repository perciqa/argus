[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ratioc"
version = "0.1.0"
description = "The Agent Reliability Engine — trace, evaluate, and optimize your AI agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "openai>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
